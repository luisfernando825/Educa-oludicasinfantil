<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="+3000 Atividades Prontas para Transformar sua Sala em Minutos. Material didático completo para professores." />
    <title>+3000 Atividades Prontas</title>
    
    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload LCP image (AVIF preferred, fallback WebP) -->
    <link rel="preload" as="image" href="https://i.imgur.com/VKCgs8s.avif" type="image/avif" fetchpriority="high" />
    <link rel="preload" as="image" href="https://i.imgur.com/VKCgs8s.webp" type="image/webp" fetchpriority="high" />
    
    <!-- CSS Crítico Inline -->
    <style id="critical-path-css">
      /* System fonts for initial load to prevent FOUT/blocking */
      body { margin: 0; background: #f8fafc; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
      .sk-h1 { font-size: 1.875rem; line-height: 1.25; font-weight: 900; color: #0F172A; margin: 0 0 1.5rem 0; letter-spacing: -0.025em; padding: 0 0.5rem; }
      .sk-vid { max-width: 24rem; }
      @media (min-width: 768px) {
        .sk-h1 { font-size: 3.75rem; line-height: 1; }
        .sk-vid { max-width: 36rem; }
      }
      /* Class added when Poppins loads */
      body.fonts-loaded { font-family: 'Poppins', sans-serif; }
    </style>

    <!-- Delay Execution: 5s or First Interaction -->
    <script>
      window.pixelId = "69be01d6fad6589b5092a1af";
      
      let thirdPartyLoaded = false;
      function loadThirdParty() {
        if (thirdPartyLoaded) return;
        thirdPartyLoaded = true;
        
        // 1. Load Google Fonts asynchronously
        var fontLink = document.createElement('link');
        fontLink.href = 'https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap';
        fontLink.rel = 'stylesheet';
        fontLink.onload = function() { document.body.classList.add('fonts-loaded'); };
        document.head.appendChild(fontLink);

        // 2. Load Tracking Pixels
        var utm = document.createElement("script");
        utm.async = true;
        utm.defer = true;
        utm.src = "https://cdn.utmify.com.br/scripts/pixel/pixel.js";
        document.head.appendChild(utm);
      }

      // Listen for user interaction
      const interactionEvents = ['touchstart', 'mouseover', 'wheel', 'scroll', 'keydown'];
      function onInteraction() {
        loadThirdParty();
        interactionEvents.forEach(e => window.removeEventListener(e, onInteraction));
      }
      
      interactionEvents.forEach(e => window.addEventListener(e, onInteraction, { passive: true, once: true }));
      
      // Fallback to 5 seconds if no interaction
      setTimeout(loadThirdParty, 5000);
    </script>
  </head>
  <body>
    <div id="root">
      <div style="background-color: #c2410c; color: #fff; padding: 0.5rem 1rem; text-align: center; font-size: 0.875rem; font-weight: 700; letter-spacing: 0.025em;">
        OFERTA POR TEMPO LIMITADO: 15:00 RESTANTES
      </div>
      <header style="position: relative; padding-top: 2rem; padding-bottom: 4rem; overflow: hidden; text-align: center;">
        <div style="max-width: 56rem; margin: 0 auto; padding: 0 1rem;">
          <div style="display: inline-flex; align-items: center; gap: 0.5rem; background-color: #fff7ed; color: #c2410c; padding: 0.25rem 1rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; margin-bottom: 1.5rem; border: 1px solid #ffedd5;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            ACESSO IMEDIATO AO MATERIAL
          </div>
          
          <h1 class="sk-h1">
            <span style="color: #FF5A1F;">+3000</span> Atividades Prontas para <span style="color: #FF5A1F;">Transformar</span> sua Sala em Minutos
          </h1>

          <div class="sk-vid" style="position: relative; width: 100%; margin: 0 auto 2rem auto; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; border: 4px solid #fff; background-color: #0f172a; aspect-ratio: 9/16; display: flex; align-items: center; justify-content: center;">
            <picture style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
              <source type="image/avif" srcset="https://i.imgur.com/VKCgs8s.avif" />
              <source type="image/webp" srcset="https://i.imgur.com/VKCgs8s.webp" />
              <img src="https://i.imgur.com/VKCgs8s.webp" alt="Carregando vídeo..." style="width: 100%; height: 100%; object-fit: cover; opacity: 0.6;" fetchpriority="high" decoding="async" />
            </picture>
            
            <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;">
              <div style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                <div style="width: 5rem; height: 5rem; background-color: #FF5A1F; border-radius: 9999px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(255,90,31,0.5);">
                  <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="#fff" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 0.25rem;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </div>
                <p style="color: #fff; font-weight: 700; font-size: 1.125rem; letter-spacing: -0.025em; text-transform: uppercase; margin: 0;">Clique para assistir</p>
              </div>
            </div>
          </div>
        </div>
      </header>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="+3000 Atividades Prontas para Transformar sua Sala em Minutos. Material didático completo para professores." />
    <title>+3000 Atividades Prontas</title>
    <meta property="og:title" content="+3000 Atividades Prontas para Professores" />
    <meta property="og:description" content="Transforme sua sala de aula com mais de 3000 atividades lúdicas e prontas para imprimir." />
    <meta property="og:image" content="https://i.imgur.com/YOAt61G.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://i.imgur.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://i.imgur.com">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap">
    </noscript>
    <link rel="preload" as="image" href="https://i.imgur.com/YOAt61G.webp" fetchpriority="high" />
    <script>
      window.pixelId = "69be01d6fad6589b5092a1af";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; font-family: sans-serif; }
        .skeleton-topbar { height: 36px; background: #c2410c; }
        .skeleton-hero {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 2rem 1rem 4rem;
          background: #f8fafc;
          min-height: 100vh;
        }
        .skeleton-badge {
          width: 240px;
          height: 28px;
          background: #ffedd5;
          border-radius: 9999px;
          margin-bottom: 1.5rem;
        }
        .skeleton-title {
          width: 90%;
          max-width: 600px;
          height: 80px;
          background: #e2e8f0;
          border-radius: 8px;
          margin-bottom: 1.5rem;
        }
        .skeleton-video {
          width: 100%;
          max-width: 384px;
          aspect-ratio: 9/16;
          background: #0f172a;
          border-radius: 2rem;
          margin-bottom: 2rem;
          border: 4px solid white;
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
          position: relative;
          overflow: hidden;
        }
        .skeleton-video img {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          opacity: 0.6;
        }
        @media (min-width: 768px) {
          .skeleton-video { max-width: 576px; }
          .skeleton-title { height: 120px; }
        }
      </style>
      <div class="skeleton-topbar"></div>
      <div class="skeleton-hero">
        <div class="skeleton-badge"></div>
        <div class="skeleton-title"></div>
        <div class="skeleton-video">
          <img src="https://i.imgur.com/YOAt61G.webp" alt="Carregando vídeo..." fetchpriority="high" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

    <link rel="preload" as="image" href="https://i.imgur.com/YOAt61G.webp" fetchpriority="high" />
    <script>
      window.pixelId = "69be01d6fad6589b5092a1af";
      window.addEventListener('load', function() {
        setTimeout(function() {
          var a = document.createElement("script");
          a.setAttribute("async", "");
          a.setAttribute("defer", "");
          a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
          document.head.appendChild(a);
        }, 1000);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; font-family: sans-serif; }
        .skeleton-topbar { height: 36px; background: #c2410c; }
        .skeleton-hero {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 2rem 1rem 4rem;
          background: #f8fafc;
          min-height: 100vh;
          text-align: center;
        }
        .skeleton-badge {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          background: #fff7ed;
          color: #c2410c;
          padding: 0.25rem 1rem;
          border-radius: 9999px;
          font-size: 0.875rem;
          font-weight: 700;
          margin-bottom: 1.5rem;
          border: 1px solid #ffedd5;
          font-family: 'Poppins', sans-serif;
        }
        .skeleton-title {
          font-size: 1.875rem;
          font-weight: 900;
          color: #0f172a;
          line-height: 1.25;
          margin-bottom: 1.5rem;
          letter-spacing: -0.025em;
          padding: 0 0.5rem;
          max-width: 800px;
          font-family: 'Poppins', sans-serif;
        }
        .skeleton-title span { color: #ff5a1f; }
        .skeleton-video {
          width: 100%;
          max-width: 384px;
          aspect-ratio: 9/16;
          background: #0f172a;
          border-radius: 2rem;
          margin-bottom: 2rem;
          border: 4px solid white;
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
          position: relative;
          overflow: hidden;
        }
        .skeleton-video img {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          opacity: 0.6;
        }
        @media (min-width: 768px) {
          .skeleton-video { max-width: 576px; }
          .skeleton-title { font-size: 3.75rem; }
        }
      </style>
      <div class="skeleton-topbar"></div>
      <div class="skeleton-hero">
        <div class="skeleton-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          ACESSO IMEDIATO AO MATERIAL
        </div>
        <h1 class="skeleton-title">
          <span>+3000</span> Atividades Prontas para <span>Transformar</span> sua Sala em Minutos
        </h1>
        <div class="skeleton-video">
          <img src="https://i.imgur.com/YOAt61G.webp" alt="Carregando vídeo..." fetchpriority="high" decoding="sync" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
